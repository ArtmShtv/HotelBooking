[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "core.settings"

python_files = ["test_*.py"]


[tool.ruff]
extend-exclude = [
    "migrations/",
]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",  # line length
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]       # re-exports
"tests/**/*.py" = ["S101"]     # allow assert in tests