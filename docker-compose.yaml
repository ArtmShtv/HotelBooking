services:

  backend:
    build: .
    container_name: django_hotel_app
    ports:
      - "8000:8000"
    networks:
      - hotel_network
    depends_on:
      - postgres
      - redis
    environment:
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DJANGO_DEBUG}
      ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
    env_file:
      - .env

  postgres:
    image: postgres:17-alpine
    container_name: postgres_hotel
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hotel_network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_NAME}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  redis:
    image: redis:latest
    container_name: redis_hotel
    volumes:
      - redis_data:/data
    networks:
      - hotel_network

volumes:
  postgres-data:
  redis_data:

networks:
  hotel_network:
    name: hotel_network
    driver: bridge